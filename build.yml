name: Build Hz Cheat

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: dotnet restore HzCheat.csproj
    
    - name: Build
      run: dotnet build HzCheat.csproj --configuration Release --no-restore
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: Hz-Cheat-Build
        path: bin/Release/
